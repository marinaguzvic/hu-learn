name: Build & push image

on:
  push:
    branches: [main]
    tags:     ["v*"]          # also triggers on v1.0.0 style tags
  workflow_dispatch:           # allow manual trigger from the Actions tab

env:
  # Change this to your registry + image name.
  # GHCR example: ghcr.io/your-github-username/hu-learn
  # Docker Hub  : your-dockerhub-username/hu-learn
  IMAGE: ghcr.io/${{ github.repository_owner }}/hu-learn

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # needed for GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login ──────────────────────────────────────────────────────────────
      # For GHCR: no extra secrets needed, uses GITHUB_TOKEN automatically.
      # For Docker Hub: add DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets and
      # swap the registry/username/password values below.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive tags ────────────────────────────────────────────────────────
      # On push to main  → :latest
      # On tag v1.2.3    → :1.2.3  AND  :latest
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── Build & push ───────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64       # TrueNAS SCALE is x86-64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use one of the above in **TrueNAS → Custom App → Image**." >> $GITHUB_STEP_SUMMARY
