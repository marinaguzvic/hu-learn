<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magyar — Language Learning</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── Sidebar ── -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-flag">🇭🇺</span>
        <div>
          <div class="logo-title">Magyar</div>
          <div class="logo-sub">Language Reference</div>
        </div>
      </div>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="search" id="globalSearch" placeholder="Search all content…" autocomplete="off" />
    </div>

    <div id="sidebarNav"></div>

    <div class="sidebar-footer">
      <span id="contentVersion"></span>
    </div>
  </nav>

  <!-- ── Main ── -->
  <div id="mainWrap">
    <header id="topbar">
      <button id="sidebarToggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div id="breadcrumb"></div>
      <div id="topbarRight"></div>
    </header>

    <main id="contentArea">
      <div id="loadingState" class="center-message">
        <div class="spinner"></div>
        <p>Loading content…</p>
      </div>
    </main>
  </div>

  <!-- ── Templates ── -->

  <!-- Verb family card -->
  <template id="tpl-verb-family">
    <div class="card verb-family-card" data-family="">
      <div class="card-header">
        <div>
          <div class="card-title"></div>
          <div class="card-sub"></div>
        </div>
        <button class="card-toggle" aria-label="Collapse">
          <svg viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
      </div>
      <div class="card-body">
        <table class="verb-table">
          <tbody></tbody>
        </table>
      </div>
    </div>
  </template>

  <!-- Verb row -->
  <template id="tpl-verb-row">
    <tr class="verb-row">
      <td class="td-prefix"><span class="prefix-badge"></span></td>
      <td class="td-hu"></td>
      <td class="td-en"></td>
      <td class="td-examples">
        <div class="example-list"></div>
      </td>
    </tr>
  </template>

  <!-- Irregular verb card -->
  <template id="tpl-irr-card">
    <div class="card irr-card">
      <div class="card-header">
        <div>
          <div class="card-title irr-base"></div>
          <div class="card-sub irr-sub"></div>
        </div>
        <button class="card-toggle" aria-label="Collapse">
          <svg viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
      </div>
      <div class="card-body">
        <p class="irr-pattern"></p>
        <div class="conj-grid"></div>
        <div class="key-forms-row"></div>
        <div class="irr-prefixes"></div>
        <div class="irr-examples-block"></div>
      </div>
    </div>
  </template>

  <script type="module" src="js/app.js"></script>
</body>
</html>
